name: Multi-Platform Checkin (GLaDOS + ikuuu + SMAI)

on:
  schedule:
    # 北京时间 9:30 (UTC 1:30)
    - cron: '30 1 * * *'
    # 北京时间 21:30 (UTC 13:30)
    - cron: '30 13 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]  # 推送时也触发，保持活跃

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run GLaDOS + ikuuu Checkin
        run: python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          WPUSH_APIKEY: ${{ secrets.WPUSH_APIKEY }}
          IKUUU_EMAIL: ${{ secrets.IKUUU_EMAIL }}
          IKUUU_PASSWORD: ${{ secrets.IKUUU_PASSWORD }}

      - name: Run SMAI.AI Checkin
        run: node smai_checkin.js
        timeout-minutes: 3
        env:
          SMAI_SESSION: ${{ secrets.SMAI_SESSION }}
          SMAI_USER_ID: ${{ secrets.SMAI_USER_ID }}

      - name: Retry on Failure
        if: failure()
        run: |
          echo "First attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
          node smai_checkin.js
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          WPUSH_APIKEY: ${{ secrets.WPUSH_APIKEY }}
          IKUUU_EMAIL: ${{ secrets.IKUUU_EMAIL }}
          IKUUU_PASSWORD: ${{ secrets.IKUUU_PASSWORD }}
          SMAI_SESSION: ${{ secrets.SMAI_SESSION }}
          SMAI_USER_ID: ${{ secrets.SMAI_USER_ID }}
