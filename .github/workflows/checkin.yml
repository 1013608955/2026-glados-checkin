name: Multi-Platform Checkin (GLaDOS + ikuuu + SMAI)

on:
  schedule:
    # 北京时间 9:30 (UTC 1:30) - 上午签到
    - cron: '30 1 * * *'
    # 北京时间 19:30 (UTC 11:30) - 下午签到
    - cron: '30 11 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Restore Checkin State
        uses: actions/cache@v4
        with:
          path: .checkin_state.json
          key: checkin-state-${{ github.run_id }}
          restore-keys: |
            checkin-state-

      - name: Run All Platforms Checkin
        id: checkin
        run: python checkin.py 2>&1 | tee checkin_output.txt
        timeout-minutes: 8
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          WPUSH_APIKEY: ${{ secrets.WPUSH_APIKEY }}
          IKUUU_EMAIL: ${{ secrets.IKUUU_EMAIL }}
          IKUUU_PASSWORD: ${{ secrets.IKUUU_PASSWORD }}
          SMAI_SESSION: ${{ secrets.SMAI_SESSION }}
          SMAI_USER_ID: ${{ secrets.SMAI_USER_ID }}
          VOAPI_TOKEN: ${{ secrets.VOAPI_TOKEN }}

      - name: Check Skip Afternoon
        id: skip_check
        run: |
          if grep -q "SKIP_AFTERNOON=true" checkin_output.txt; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "🎉 上午全部成功，下午已跳过"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Retry on Failure
        if: failure()
        run: |
          echo "首次失败，60秒后重试..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          WPUSH_APIKEY: ${{ secrets.WPUSH_APIKEY }}
          IKUUU_EMAIL: ${{ secrets.IKUUU_EMAIL }}
          IKUUU_PASSWORD: ${{ secrets.IKUUU_PASSWORD }}
          SMAI_SESSION: ${{ secrets.SMAI_SESSION }}
          SMAI_USER_ID: ${{ secrets.SMAI_USER_ID }}
          VOAPI_TOKEN: ${{ secrets.VOAPI_TOKEN }}
